server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: ms-catalogo
          uri: lb://ms-catalogo
          predicates:
            - Path=/productos/**
        - id: ms-stock
          uri: lb://ms-stock
          predicates:
            - Path=/stock/**
        - id: ms-ordenes
          uri: lb://ms-ordenes
          predicates:
            - Path=/ordenes/**
        - id: ms-usuarios
          uri: lb://ms-usuarios
          predicates:
            - Path=/usuarios/**
        - id: ms-envios
          uri: lb://ms-envios
          predicates:
            - Path=/envios/**
        - id: ms-pagos
          uri: lb://ms-pagos
          predicates:
            - Path=/pagos/**
        - id: ms-notificaciones
          uri: lb://ms-notificaciones
          predicates:
            - Path=/notificaciones/**
        - id: ms-auditoria
          uri: lb://ms-auditoria
          predicates:
            - Path=/auditoria/**
        - id: ms-proveedores
          uri: lb://ms-proveedores
          predicates:
            - Path=/proveedores/**
        - id: ms-reportes
          uri: lb://ms-reportes
          predicates:
            - Path=/reportes/**
        - id: openapi
          uri: http://localhost:8080
          predicates:
            - Path=/v3/api-docs/**
          filters:
            - RewritePath=/v3/api-docs/(?<path>.*), /${path}/v3/api-docs

springdoc:
  swagger-ui:
    urls:
      - name: MS Catalogo
        url: /catalogo/v3/api-docs
      - name: MS Stock
        url: /stock/v3/api-docs
      - name: MS Ordenes
        url: /ordenes/v3/api-docs
      - name: MS Usuarios
        url: /usuarios/v3/api-docs
      - name: MS Envios
        url: /envios/v3/api-docs
      - name: MS Pagos
        url: /pagos/v3/api-docs
      - name: MS Notificaciones
        url: /notificaciones/v3/api-docs
      - name: MS Auditoria
        url: /auditoria/v3/api-docs
      - name: MS Proveedores
        url: /proveedores/v3/api-docs
      - name: MS Reportes
        url: /reportes/v3/api-docs
  api-docs:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

logging:
  level:
    org.springframework.cloud.gateway: INFO
