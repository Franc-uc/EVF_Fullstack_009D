    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
      ms-catalogo:
        condition: service_started
      ms-stock:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/ms_ordenes?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
