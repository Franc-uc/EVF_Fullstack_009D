      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/ms_stock?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - logistics-network

  ms-ordenes:
